<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Duc Chinh | Ghibli Vibe Profile</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/1725699148.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="page-bg"></div>

    <header class="bar">
        <div class="lbar">
            <i class="fa-solid fa-seedling"></i>
            <p>forest</p> <p class="d"> / </p> <p>projects</p> <p class="d"> / </p> <p>myprofile</p>
        </div>
        <div class="rbar">
            <p>Share</p>
            <i class="fa-solid fa-comment"></i>
            <i class="fa-solid fa-clock"></i>
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <main class="profile-wrap">
        <section class="hero">
            <div class="image">
                <img src="image/image1.jpg" alt="Cover image">
            </div>

            <img class="avatar" src="image/avatar.jpg" alt="Le Duc Chinh avatar">
            <div class="intro-card">
                <p><strong>Hello there! I'm Le Duc Chinh ✨</strong></p>
                <p>Welcome to my little corner on the internet.</p>
            </div>
        </section>

        <section class="content">
            <div class="box">
                <div class="titlebox">
                    <p>About me</p>
                </div>
                <p>💻 I'm a student at UIT (University Of Information Technology)</p>
                <p>🚩 I want to be an AI Engineer</p>

                <div class="titlebox">
                    <p>I code with</p>
                </div>
                <div class="code">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/ISO_C%2B%2B_Logo.svg" class="logo" alt="C++ logo">
                    <img src="image/html.png" class="logo" alt="HTML logo">
                    <img src="image/css.png" class="logo" alt="CSS logo">
                </div>

                <div class="titlebox">
                    <p>Connect with me</p>
                </div>
                <div class="slogo">
                    <a href="https://www.facebook.com/DucChinh.Le2k6"><img src="image/facebook.png" class="logo" alt="Facebook"></a>
                    <a href="https://www.instagram.com/lcduc.c.21"><img src="image/instagram.png" class="logo" alt="Instagram"></a>
                    <a href="#"><img src="image/linkedin.png" class="logo" alt="LinkedIn"></a>
                    <a href="https://github.com/LcChinh21"><img src="image/github.png" class="logo" alt="GitHub"></a>
                    <a href="#"><img src="image/discord.png" class="logo" alt="Discord"></a>
                </div>

                <div class="decorbox">
                    <img src="image/download (3).jpg" alt="Decorative image">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
